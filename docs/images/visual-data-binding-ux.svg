<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" fill="none">
  <rect width="1200" height="760" fill="#fffdf7"/>
  <text x="60" y="72" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#111827">Visual data binding UX</text>
  <text x="62" y="108" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">Make structured data visible, contextual, and safe to bind.</text>

  <rect x="80" y="170" width="260" height="92" rx="14" fill="#eef6ff" stroke="#2563eb" stroke-width="3"/>
  <text x="210" y="205" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#0f172a">Schema fields</text>
  <text x="210" y="232" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">declared contract</text>

  <rect x="80" y="315" width="260" height="92" rx="14" fill="#ecfdf5" stroke="#059669" stroke-width="3"/>
  <text x="210" y="350" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#0f172a">Sample data</text>
  <text x="210" y="377" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">real preview values</text>

  <rect x="80" y="460" width="260" height="92" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
  <text x="210" y="495" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#0f172a">Repeat scope</text>
  <text x="210" y="522" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">item fields in context</text>

  <rect x="80" y="605" width="260" height="92" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/>
  <text x="210" y="640" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#0f172a">Variables</text>
  <text x="210" y="667" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">computed document values</text>

  <rect x="485" y="305" width="260" height="150" rx="18" fill="#f8fafc" stroke="#64748b" stroke-width="3"/>
  <text x="615" y="346" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#0f172a">Data explorer</text>
  <text x="615" y="376" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#334155">groups fields</text>
  <text x="615" y="404" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#334155">filters by selected node</text>
  <text x="615" y="432" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#334155">shows bindable targets</text>

  <rect x="875" y="205" width="245" height="88" rx="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="3"/>
  <text x="998" y="240" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#0f172a">Text node</text>
  <text x="998" y="266" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">{{business.name}}</text>

  <rect x="875" y="340" width="245" height="88" rx="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="3"/>
