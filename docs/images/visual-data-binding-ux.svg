  <text x="998" y="401" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">shipment.handlingUnits[]</text>

  <rect x="875" y="475" width="245" height="88" rx="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="3"/>
