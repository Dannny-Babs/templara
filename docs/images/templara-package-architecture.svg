<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" fill="none">
  <rect width="1200" height="760" fill="#fffdf7"/>
  <text x="60" y="72" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#111827">Templara package architecture</text>
  <text x="62" y="108" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">Studio is a product on top of reusable document packages.</text>

  <rect x="430" y="148" width="340" height="86" rx="14" fill="#eef6ff" stroke="#2563eb" stroke-width="3"/>
  <text x="600" y="184" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#0f172a">apps/studio</text>
  <text x="600" y="210" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">visual editor product</text>

  <rect x="90" y="310" width="260" height="86" rx="14" fill="#f8fafc" stroke="#64748b" stroke-width="3"/>
  <text x="220" y="346" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#0f172a">@templara/editor</text>
  <text x="220" y="372" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">authoring state + tools</text>

  <rect x="470" y="310" width="260" height="86" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
  <text x="600" y="346" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#0f172a">@templara/core</text>
  <text x="600" y="372" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">schema + document language</text>

  <rect x="850" y="310" width="260" height="86" rx="14" fill="#ecfdf5" stroke="#059669" stroke-width="3"/>
  <text x="980" y="346" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#0f172a">@templara/templates</text>
  <text x="980" y="372" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">starter docs + sample data</text>

  <rect x="470" y="470" width="260" height="86" rx="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="3"/>
  <text x="600" y="506" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#0f172a">@templara/renderer</text>
  <text x="600" y="532" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">template + data to render tree</text>

  <rect x="170" y="620" width="280" height="74" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/>
  <text x="310" y="653" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#0f172a">@templara/react-renderer</text>
  <text x="310" y="677" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">browser preview surface</text>

  <rect x="750" y="620" width="280" height="74" rx="14" fill="#f0f9ff" stroke="#0284c7" stroke-width="3"/>
  <text x="890" y="653" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#0f172a">@templara/pdf</text>
  <text x="890" y="677" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">export preflight + PDF</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" stroke="#334155" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <path d="M535 234 C500 265 350 280 255 310" stroke="#334155" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M600 234 L600 306" stroke="#334155" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M665 234 C700 265 850 280 945 310" stroke="#334155" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M600 396 L600 466" stroke="#334155" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M540 556 C490 590 410 610 340 620" stroke="#334155" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M660 556 C710 590 790 610 860 620" stroke="#334155" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="80" y="158" width="250" height="78" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="7 8"/>
  <text x="205" y="190" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#334155">Boundary rule</text>
  <text x="205" y="214" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569">UI does not leak into engine code</text>
</svg>
