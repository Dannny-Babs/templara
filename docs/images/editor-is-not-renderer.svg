<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" fill="none">
  <rect width="1200" height="760" fill="#fffdf7"/>
  <text x="60" y="72" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#111827">The editor is not the renderer</text>
  <text x="62" y="108" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">Same template JSON. Two different projections.</text>

  <rect x="455" y="145" width="290" height="82" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
  <text x="600" y="180" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#0f172a">Template JSON</text>
  <text x="600" y="205" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">source of truth</text>

  <rect x="110" y="330" width="370" height="250" rx="18" fill="#eef6ff" stroke="#2563eb" stroke-width="3"/>
  <text x="295" y="372" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#0f172a">Editor</text>
  <text x="295" y="404" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#334155">authoring mode</text>
  <text x="165" y="450" font-family="Inter, Arial, sans-serif" font-size="17" fill="#0f172a">- one active page</text>
  <text x="165" y="482" font-family="Inter, Arial, sans-serif" font-size="17" fill="#0f172a">- authored nodes</text>
  <text x="165" y="514" font-family="Inter, Arial, sans-serif" font-size="17" fill="#0f172a">- handlebars</text>
  <text x="165" y="546" font-family="Inter, Arial, sans-serif" font-size="17" fill="#0f172a">- one repeat template row</text>

  <rect x="720" y="330" width="370" height="250" rx="18" fill="#f5f3ff" stroke="#7c3aed" stroke-width="3"/>
  <text x="905" y="372" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#0f172a">Preview / Export</text>
  <text x="905" y="404" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#334155">rendered output mode</text>
  <text x="775" y="450" font-family="Inter, Arial, sans-serif" font-size="17" fill="#0f172a">- resolved data</text>
  <text x="775" y="482" font-family="Inter, Arial, sans-serif" font-size="17" fill="#0f172a">- expanded repeats</text>
  <text x="775" y="514" font-family="Inter, Arial, sans-serif" font-size="17" fill="#0f172a">- pagination</text>
  <text x="775" y="546" font-family="Inter, Arial, sans-serif" font-size="17" fill="#0f172a">- diagnostics</text>

  <defs>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" stroke="#334155" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <path d="M520 227 C405 265 330 290 300 326" stroke="#334155" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow2)"/>
  <path d="M680 227 C795 265 870 290 900 326" stroke="#334155" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow2)"/>

  <rect x="430" y="635" width="340" height="58" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="7 8"/>
  <text x="600" y="660" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#334155">Do not collapse these modes</text>
  <text x="600" y="681" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569">The editor edits patterns. The renderer creates results.</text>
</svg>
